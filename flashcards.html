<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Flashcards</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: gradientBg 15s ease infinite; color: #fff; }
    @keyframes gradientBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .container { text-align: center; width: 100%; max-width: 500px; padding: 30px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.15); box-sizing: border-box; }
    .flashcard-wrapper { perspective: 1000px; width: 100%; height: 300px; margin-bottom: 25px; cursor: pointer; }
    .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .flashcard.flipped { transform: rotateY(180deg); }
    .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; border-radius: 18px; font-size: 1.5rem; font-weight: 600; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: transform 0.2s ease; }
    .side:hover { transform: scale(1.02); }
    .front { background: linear-gradient(135deg, #ffffff, #f1f3f9); color: #2d3748; border: 1px solid rgba(255,255,255,0.8); }
    .back { transform: rotateY(180deg); background: linear-gradient(135deg, #4a00e0, #8e2de2); color: #fff; }
    .card-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: #a0aec0; }
    .back .card-label { color: #e2e8f0; }
    .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
    button { padding: 14px 28px; font-size: 1rem; border: none; border-radius: 50px; background: #fff; color: #4a00e0; cursor: pointer; font-weight: bold; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
    button:hover { background: #4a00e0; color: #fff; transform: translateY(-2px); }
    .progress { font-size: 1rem; color: rgba(255,255,255,0.9); font-weight: 500; background: rgba(0,0,0,0.2); padding: 6px 16px; border-radius: 20px; display: inline-block; }
    .hint { font-size: 0.8rem; color: rgba(255,255,255,0.7); margin-top: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="flashcard-wrapper" onclick="toggleFlip()">
      <div id="card" class="flashcard">
        <div class="side front">
          <div class="card-label">Question</div>
          <div id="front-text">Loading...</div>
        </div>
        <div class="side back">
          <div class="card-label">Answer</div>
          <div id="back-text">Loading...</div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button onclick="prevCard()">◀ Prev</button>
      <button onclick="toggleFlip()">Flip</button>
      <button onclick="nextCard()">Next ▶</button>
    </div>
    <div id="progress" class="progress">0 / 0</div>
    <div class="hint">Use Left/Right arrows to change cards, Spacebar to flip.</div>
  </div>

  <script>
    let cards = []; let index = 0;
    const cardEl = document.getElementById('card');
    const frontEl = document.getElementById('front-text');
    const backEl = document.getElementById('back-text');
    const progEl = document.getElementById('progress');

    fetch('flashcards.json')
      .then(r => r.json())
      .then(data => { 
        cards = data.sort(() => Math.random() - 0.5); 
        updateCard(); 
      });

    function updateCard() {
      if(!cards.length) return;
      cardEl.classList.remove('flipped');
      setTimeout(() => {
        frontEl.innerText = cards[index].front;
        backEl.innerText = cards[index].back;
        progEl.innerText = `${index + 1} / ${cards.length}`;
      }, cardEl.classList.contains('flipped') ? 300 : 0);
    }

    function toggleFlip() { cardEl.classList.toggle('flipped'); }
    function nextCard() { index = (index + 1) % cards.length; updateCard(); }
    function prevCard() { index = (index - 1 + cards.length) % cards.length; updateCard(); }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); toggleFlip(); }
      else if (e.code === 'ArrowRight') { nextCard(); }
      else if (e.code === 'ArrowLeft') { prevCard(); }
    });
  </script>
</body>
</html>
