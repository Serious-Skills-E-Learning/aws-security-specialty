<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS Security Specialty Flashcards</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f4f4f9; color: #232f3e; }
    .container { text-align: center; width: 100%; max-width: 500px; padding: 20px; }
    .flashcard-wrapper { perspective: 1000px; width: 100%; height: 280px; margin-bottom: 20px; cursor: pointer; }
    .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s ease; box-shadow: 0 6px 12px rgba(0,0,0,0.08); border-radius: 12px; }
    .flashcard.flipped { transform: rotateY(180deg); }
    .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; border-radius: 12px; background: white; font-size: 1.3rem; font-weight: 500; text-align: center; border: 1px solid #e0e0e0; border-top: 6px solid #ff9900; }
    .back { transform: rotateY(180deg); background-color: #fcfcfc; border-top: 6px solid #232f3e; }
    .security-badge { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px; margin-bottom: 20px; color: #758296; }
    .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; }
    button { padding: 12px 24px; font-size: 1rem; border: 1px solid #ff9900; border-radius: 6px; background-color: white; color: #ff9900; cursor: pointer; font-weight: bold; transition: all 0.2s; }
    button:hover { background-color: #ff9900; color: white; }
    .progress { font-size: 0.9rem; color: #666; font-weight: 600; margin-top: 5px; }
    .hint { font-size: 0.8rem; color: #999; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="flashcard-wrapper" onclick="toggleFlip()">
      <div id="card" class="flashcard">
        <div class="side front">
          <div class="security-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff9900" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            AWS Security Specialty
          </div>
          <div id="front-text">Loading...</div>
        </div>
        <div class="side back">
          <div class="security-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#232f3e" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Verified Answer
          </div>
          <div id="back-text">Loading...</div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button onclick="prevCard()">◀ Prev</button>
      <button onclick="toggleFlip()">Flip (Space)</button>
      <button onclick="nextCard()">Next ▶</button>
    </div>
    <div id="progress" class="progress">0 / 0</div>
    <div class="hint">Tip: Use Left/Right arrows to navigate, Spacebar to flip.</div>
  </div>

  <script>
    let cards = []; let index = 0;
    const cardEl = document.getElementById('card');
    const frontEl = document.getElementById('front-text');
    const backEl = document.getElementById('back-text');
    const progEl = document.getElementById('progress');

    fetch('flashcards.json')
      .then(r => r.json())
      .then(data => { 
        cards = data.sort(() => Math.random() - 0.5); 
        updateCard(); 
      });

    function updateCard() {
      if(!cards.length) return;
      cardEl.classList.remove('flipped');
      setTimeout(() => {
        frontEl.innerText = cards[index].front;
        backEl.innerText = cards[index].back;
        progEl.innerText = `${index + 1} / ${cards.length}`;
      }, cardEl.classList.contains('flipped') ? 200 : 0);
    }

    function toggleFlip() { cardEl.classList.toggle('flipped'); }
    function nextCard() { index = (index + 1) % cards.length; updateCard(); }
    function prevCard() { index = (index - 1 + cards.length) % cards.length; updateCard(); }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); toggleFlip(); }
      else if (e.code === 'ArrowRight') { nextCard(); }
      else if (e.code === 'ArrowLeft') { prevCard(); }
    });
  </script>
</body>
</html>
